services:
  - type: web
    name: traffic-backend
    runtime: docker
    region: singapore
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: traffic-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: traffic-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: traffic-db
          property: password

databases:
  - name: traffic-db
    databaseName: traffic_db
    user: traffic_user
    region: singapore
    plan: free
